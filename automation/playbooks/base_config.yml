---
- name: Configuración Base, Túneles GRE/IPSec y Verificación de Cisco IOSv
  hosts: all
  gather_facts: no
  connection: network_cli

  tasks:

    - name: Configurar hostname de forma idempotente
      cisco.ios.ios_config:
        lines:
          - hostname {{ inventory_hostname }}

    - name: Configurar interfaces con dirección IP
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - ip address {{ item.address }} {{ item.mask }}
          - no shutdown
      loop: "{{ interfaces }}"

    - name: Configurar interfaces Loopback
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - ip address {{ item.address }} {{ item.mask }}
          - no shutdown
      loop: "{{ loopbacks }}"

    - name: Crear interfaz Tunnel0
      cisco.ios.ios_config:
        parents: "interface Tunnel0"
        lines:
          - ip address {{ tunnel0_ip }} {{ tunnel0_mask }}
          - tunnel source {{ tunnel0_source }}
          - tunnel destination {{ tunnel0_destination }}
          - tunnel mode gre ip
          - no shutdown

    - name: Crear interfaz Tunnel1
      cisco.ios.ios_config:
        parents: "interface Tunnel1"
        lines:
          - ip address {{ tunnel1_ip }} {{ tunnel1_mask }}
          - tunnel source {{ tunnel1_source }}
          - tunnel destination {{ tunnel1_destination }}
          - tunnel mode gre ip
          - no shutdown

    - name: Crear ACLs para GRE
      cisco.ios.ios_config:
        lines: |
          {% for acl in gre_acls %}
          ip access-list extended ACL{{ acl.acl }}
            permit gre host {{ acl.src }} host {{ acl.dst }}
          {% endfor %}

    - name: Configurar políticas de cifrado IPSec
      cisco.ios.ios_config:
        lines:
          - encryption aes 256
          - hash sha
          - authentication pre-share
          - group 2
          - lifetime 86400
        parents: crypto isakmp policy 10

    - name: Configurar transform-set IPSec
      cisco.ios.ios_config:
        lines:
          - crypto ipsec transform-set MYSET esp-aes esp-sha-hmac

    - name: Crear mapas de cifrado y asociarlos
      cisco.ios.ios_config:
        lines: |
          {% for peer in crypto_peers %}
          crypto map {{ peer.map_tag }} {{ peer.seq }} ipsec-isakmp
            set peer {{ peer.ip }}
            set transform-set MYSET
            match address ACL{{ peer.acl }}
          {% endfor %}

    - name: Aplicar crypto map a interfaces
      cisco.ios.ios_config:
        lines: |
          {% for int in crypto_interfaces %}
          interface {{ int.name }}
            crypto map {{ int.map_tag }}
          {% endfor %}

    - name: Configurar rutas estáticas hacia los loopbacks remotos
      cisco.ios.ios_config:
        lines: "{{ static_routes }}"

    - name: Verificar conectividad con ping
      cisco.ios.ios_command:
        commands: "{{ ping_targets | map('regex_replace', '^(.*)$', 'ping \\1') | list }}"
